@if (isOpen) {
  <div class="export-overlay" (click)="closed.emit()">
    <div class="export-modal" (click)="$event.stopPropagation()">
      <h2>Data pro export</h2>
      @if (warning) { <div class="export-warning">{{ warning }}</div> }
      <div class="export-section">
        <h3>Co exportovat</h3>
        <label class="export-option"><input type="checkbox" [(ngModel)]="includeProjects" />Projekty</label>
        <label class="export-option"><input type="checkbox" [(ngModel)]="includeTasks" />Úkoly</label>
        <label class="export-option"><input type="checkbox" [(ngModel)]="includeUser" />Uživatelské informace</label>
      </div>
      <div class="export-section">
        <h3>Formát</h3>
        <label class="export-option"><input type="radio" name="format" value="json" [(ngModel)]="format" />JSON</label>
        <label class="export-option"><input type="radio" name="format" value="csv" [(ngModel)]="format" />CSV</label>
        <label class="export-option"><input type="radio" name="format" value="md" [(ngModel)]="format" />Markdown</label>
      </div>
      <div class="export-buttons">
        <button class="export-btn export-btn-secondary" (click)="closed.emit()">Zrušit</button>
        <button class="export-btn export-btn-primary" (click)="handleExport()">Exportovat</button>
      </div>
    </div>
  </div>
}
