<div class="auth-container">
  <h2>Přihlášení</h2>
  <form class="auth-form" (submit)="handleLogin($event)">
    <input type="text" placeholder="Uživatelské jméno" [(ngModel)]="username" name="username" required />
    <input type="password" placeholder="Heslo" [(ngModel)]="password" name="password" required />
    <button type="submit">Přihlásit</button>
    @if (error) { <p class="auth-error">{{ error }}</p> }
  </form>
  <p class="no-account-text">Nemáte účet? <a routerLink="/register">Zaregistrovat se</a></p>
</div>
